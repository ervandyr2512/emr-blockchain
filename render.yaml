services:
  - type: web
    name: emr-blockchain-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: PORT
        value: 10000
      - key: RPC_URL
        value: https://eth-sepolia.g.alchemy.com/v2/8WOhlGqSJIqwxwt1wwbDY
      - key: CONTRACT_ADDRESS
        value: 0xa328d54d623025b96F91eB654F2A77668cd6EC4c
      - key: PRIVATE_KEY
        sync: false   # set manually in Render dashboard (sensitive)
      - key: DATA_DIR
        value: ./data/records
